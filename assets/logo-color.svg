<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" fill="none">
  <!-- V entrelaçado (símbolo da marca) -->
  <g transform="translate(0, 5)">
    <!-- V verde (frente) -->
    <path d="M10 5 L30 5 L50 55 L70 5 L90 5 L60 75 L40 75 Z" fill="#2DB550"/>
    <!-- V azul (atrás, deslocado) -->
    <path d="M35 5 L55 5 L75 55 L95 5 L115 5 L85 75 L65 75 Z" fill="#2B3990"/>
    <!-- Triângulo branco no cruzamento para efeito de profundidade -->
    <path d="M50 55 L60 75 L65 75 L55 55 Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M55 5 L70 5 L60 30 L50 30 Z" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- Texto AUTO -->
  <text x="125" y="38" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#2B3990">AUTO</text>
  <!-- Texto VALE -->
  <text x="225" y="38" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#2DB550">VALE</text>
  <!-- Texto PREVENÇÕES -->
  <text x="125" y="60" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#2B3990" letter-spacing="1">PREVENÇÕES</text>
  <!-- Slogan -->
  <text x="125" y="78" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#666666" font-style="italic">PROTEÇÃO VEICULAR DE VERDADE!</text>
</svg>
