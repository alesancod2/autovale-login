  <!-- Slogan -->
  <text x="125" y="78" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.7)" font-style="italic">PROTEÇÃO VEICULAR DE VERDADE!</text>
