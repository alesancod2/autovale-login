  </g>
  <!-- Texto AUTO -->
  <text x="125" y="38" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="white">AUTO</text>
  <!-- Texto VALE -->
  <text x="225" y="38" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#5DD97B">VALE</text>
