<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <!-- Símbolo V entrelaçado - versão monocromática branca para fundo escuro -->
  <g transform="translate(10, 10)">
    <!-- V branco (esquerda) -->
    <path d="M0 0 L22 0 L52 80 L82 0 L104 0 L62 100 L42 100 Z" fill="rgba(255,255,255,0.85)"/>
    <!-- V branco (direita) -->
    <path d="M40 0 L62 0 L92 80 L122 0 L144 0 L102 100 L82 100 Z" fill="white"/>
    <!-- Corte transparente no cruzamento inferior -->
    <path d="M52 80 L62 100 L82 100 L72 80 Z" fill="rgba(43,57,144,0.6)"/>
    <!-- Triângulo no cruzamento superior -->
    <path d="M62 0 L82 0 L72 22 L62 22 Z" fill="rgba(43,57,144,0.4)"/>
  </g>
  <!-- Texto AUTOVALE -->
  <text x="168" y="52" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="white">AUTO</text>
  <text x="280" y="52" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.8)">VALE</text>
  <!-- Texto PREVENÇÕES -->
  <text x="168" y="78" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="1">PREVENÇÕES</text>
  <!-- Slogan -->
  <text x="168" y="100" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.6)" font-style="italic">PROTEÇÃO VEICULAR DE VERDADE!</text>
</svg>
